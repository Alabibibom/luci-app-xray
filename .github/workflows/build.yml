name: Build luci-app-xray ipk

on:
  workflow_dispatch:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch:
          - x86_64
          - aarch64_generic

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download OpenWrt SDK
        run: |
          case "${{ matrix.arch }}" in
            x86_64)
              SDK_URL="https://downloads.openwrt.org/releases/24.10.1/targets/x86/64/openwrt-sdk-24.10.1-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
              ;;
            aarch64_generic)
              SDK_URL="https://downloads.openwrt.org/releases/24.10.1/targets/armsr/armv8/openwrt-sdk-24.10.1-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
              ;;
          esac
          wget -q "$SDK_URL"
          tar -xf openwrt-sdk-*.tar.zst
          mv openwrt-sdk-* sdk

      - name: Build
        run: |
          cd sdk
          echo "src-link luci_app_xray $GITHUB_WORKSPACE" >> feeds.conf.default
          ./scripts/feeds update luci_app_xray
          ./scripts/feeds install -a -p luci_app_xray
          make defconfig
          make package/luci-app-xray/compile V=s -j$(nproc)

      - name: Upload ipk
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-xray-${{ matrix.arch }}
          path: sdk/bin/packages/**/luci-app-xray*.ipk
